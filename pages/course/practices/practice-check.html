<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Check | Explorer Course</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../style.css" />
  <link rel="stylesheet" href="../course.css" />
</head>
<body>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <header class="site-header">
    <div class="logo">Code Explorers</div>
    <nav class="nav">
      <a href="../../../index.html">Home</a>
      <a href="../course-home.html">Explorer Course</a>
      <a href="../certificate.html">Certificate</a>
    </nav>
  </header>

  <main class="page-content">
    <section class="page-hero">
      <p class="eyebrow">Practice</p>
      <h1>Practice Check</h1>
      <p class="subtitle">Answer the question and save your score.</p>
    </section>

    <section class="content-card">
      <form class="practice-form" data-practice="practiceQuiz" data-answer="improve">
        <h2>Why is practice important in coding?</h2>

        <label>
          <input type="radio" name="quiz-option" value="decorate" />
          It makes the computer prettier
        </label>
        <br><br>

        <label>
          <input type="radio" name="quiz-option" value="improve" />
          It helps you improve your skills
        </label>
        <br><br>

        <label>
          <input type="radio" name="quiz-option" value="close" />
          It closes the website
        </label>
        <br><br>

        <button type="submit" class="button">Submit Answer</button>
      </form>

      <p class="lesson-message" id="practiceMessage"></p>
    </section>

    <section class="next-step">
      <a class="button secondary-button" href="sequences-check.html">Next Practice</a>
    </section>
  </main>

  <footer class="site-footer">
    <p>Practice helps explorers grow.</p>
  </footer>

  <script src="../course.js"></script>
</body>
</html>
